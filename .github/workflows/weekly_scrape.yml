name: Weekly Data Refresh

on:
  schedule:
    # Runs at 00:00 every Monday (UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
    # We pass the secret API key from GitHub to our environment
      env:
        RIOT_KEY: ${{ secrets.RIOT_KEY }}
      run: python modules/collect_data.py

    - name: Commit and Push Data
      run: |
        git config --global user.name "NexusNode-Bot"
        git config --global user.email "bot@nexusnode.ai"
        git add data/raw/league_match_data.csv
        git commit -m "Automated Weekly Data Refresh [skip ci]" || echo "No changes to commit"
        git push